<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>拖拽编辑器测试</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="builder.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: #f5f7fa; min-height: 100vh; padding: 20px; }
        .test-header { text-align: center; margin-bottom: 20px; }
        .test-header h1 { color: #1e3a8a; margin-bottom: 8px; }
        .test-header p { color: #6b7280; }
        #builderContainer { height: calc(100vh - 150px); }
    </style>
</head>
<body>
    <div class="test-header">
        <h1><i class="fas fa-tools"></i> 拖拽编辑器功能测试</h1>
        <p>测试所有组件和功能是否正常工作</p>
    </div>
    
    <main id="builderContainer"></main>

    <script src="../components/component-config.js"></script>
    <script src="../components/component-renderer.js"></script>
    <script src="builder.js"></script>
    <script>
        // 初始化编辑器
        document.addEventListener('DOMContentLoaded', function() {
            initBuilder('builderContainer', {
                onChange: (components) => {
                    console.log('组件变化:', components);
                },
                onSave: (components) => {
                    console.log('保存组件:', components);
                }
            });
            
            // 添加一些测试组件
            setTimeout(() => {
                console.log('添加测试组件...');
                
                // 添加文本组件
                builder.addComponent('basic', 'text');
                
                // 添加按钮组件
                setTimeout(() => {
                    builder.addComponent('basic', 'button');
                }, 100);
                
                console.log('测试组件添加完成');
            }, 500);
        });
    </script>
</body>
</html>
