server {
    listen 80;
    server_name api.yaozijin.com 47.95.236.85;
    root /www/wwwroot/api.yaozijin.com;
    index index.html index.php;

    # 前端页面
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后台管理
    location /admin {
        try_files $uri $uri/ =404;
    }

    # PHP API接口
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    # 上传文件访问
    location /cms/uploads {
        alias /www/wwwroot/api.yaozijin.com/cms/uploads;
    }

    # 禁止访问敏感文件
    location ~ /\. {
        deny all;
    }
    location ~ /(config\.php|init-db\.php) {
        deny all;
    }
}
